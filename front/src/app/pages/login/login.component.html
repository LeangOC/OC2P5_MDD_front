<div class="login-page">

  <header class="login-header">

    <button
      mat-icon-button
      routerLink="/"
      aria-label="Retour">
      <mat-icon>arrow_back</mat-icon>
    </button>

    <img
      src="assets/logo_p6.png"
      alt="Logo MDD"
      class="desktop-logo">

  </header>

  <img
    src="assets/logo_p6.png"
    alt="Logo MDD"
    class="mobile-logo">

  <h1>Se connecter</h1>

  <form
    class="login-form"
    (ngSubmit)="onSubmit()">

    <mat-form-field appearance="outline">
      <mat-label>Adresse e-mail</mat-label>
      <input
        matInput
        type="email"
        name="email"
        [(ngModel)]="email">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Mot de passe</mat-label>
      <input
        matInput
        type="password"
        name="password"
        [(ngModel)]="password">
    </mat-form-field>

    <button
      mat-raised-button
      color="primary"
      class="submit-btn btn-rounded"
      type="submit">
      Se connecter
    </button>

  </form>

</div>
